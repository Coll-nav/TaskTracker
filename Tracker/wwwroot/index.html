<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker - Вход</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/main.css"/>
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Task Tracker</h1>
            <p>Войдите в систему</p>
        </div>

        <div class="auth-tabs">
            <button class="tab-btn active" data-role="admin">Администратор</button>
            <button class="tab-btn" data-role="user">Пользователь</button>
        </div>

        <div class="auth-form" id="adminForm">
            <div class="input-group">
                <i class="bi bi-person"></i>
                <input type="text" id="adminLogin" placeholder="Логин" value="admin">
            </div>
            <div class="input-group">
                <i class="bi bi-lock"></i>
                <input type="password" id="adminPassword" placeholder="Пароль" value="admin123">
            </div>
            <div class="info-text">
                <i class="bi bi-info-circle"></i>
                <span>Демо-логин: admin / admin123</span>
            </div>
            <button class="auth-btn" onclick="login('admin')">Войти как Администратор</button>
        </div>

        <div class="auth-form hidden" id="userForm">
            <div class="input-group">
                <i class="bi bi-person"></i>
                <input type="text" id="userLogin" placeholder="Логин" value="user">
            </div>
            <div class="input-group">
                <i class="bi bi-lock"></i>
                <input type="password" id="userPassword" placeholder="Пароль" value="user123">
            </div>
            <div class="info-text">
                <i class="bi bi-info-circle"></i>
                <span>Демо-логин: user / user123</span>
            </div>
            <button class="auth-btn" onclick="login('user')">Войти как Пользователь</button>
        </div>

        <div class="auth-footer">
            <span>Версия 1.0</span>
        </div>
    </div>
</div>
</body>
</html>
