<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <title>Task Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/site.css"/>
</head>
<body>
<div class="admin-panel" id="adminPanel" style="display: none;">
    <div class="admin-selector">
        <label>👥 Выбрать пользователя:</label>
        <select id="userSelect" class="user-select" onchange="onUserSelect()">
            <option value="">-- Все пользователи --</option>
        </select>
    </div>
</div>
<i class="bi bi-arrow-repeat" id="f_i"></i>

<h1>Task Tracker</h1>
<div class="header-right">
    <span class="user-name" id="userNameDisplay"></span>
    <button class="logout-btn" onclick="logout()">Выйти</button>
</div>

<!-- Основное поле для ввода задачи -->
<div class="container">
    <input id="taskInput" type="text" placeholder="Новая задача..." />
    <button id="add" onclick="openCreateModal()">Создать</button>
</div>

<!--Кнопки сортировки -->
<div class="sort-buttons">
    <button class="srt-btn" data-sort="date" onclick="sortTasksBy('date')">По Дате Создания</button>
    <button class="srt-btn" data-sort="deadline" onclick="sortTasksBy('deadline')">По Дедлайну</button>
    <button class="srt-btn" data-sort="title" onclick="sortTasksBy('title')">По Названию</button>
</div>

<!-- Список задач -->
<div class="list_container">
    <div class="list-header">
    </div>
    <div id="taskList"></div>
</div>

<!-- Секция тегов (под списком задач) -->
<div class="tags-section">
    <div class="tags-header">
        <h3>Теги</h3>
        <div class="tag-input-container">
            <input id="tagInput" type="text" placeholder="Введите тег" />
            <button onclick="CreatedTag()">Добавить</button>
        </div>
    </div>
    <div id="tags-container"></div>
</div>

<div id="taskModal" class="modal" style="display: none;">
    <div class="modal-content">
        <h3>Создание задачи</h3>
        <div id="label_tit">Название задачи: </div>
        <label>Дедлайн</label>
        <input type="datetime-local" id="modalTaskDeadline">
        <div class="modal-buttons">
            <button onclick="addTask()">Создать</button>
            <button onclick="closeModal()">Отмена</button>
        </div>
    </div>
</div>
<script src="js/site.js"></script>
<script src="js/subtask.js"></script>
<script src="js/comment.js"></script>
<script src="js/tags.js"></script>
</body>
</html>
